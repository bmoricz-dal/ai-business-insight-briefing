name: Business Source Pack

on:
  schedule:
    - cron: "50 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: business-source-pack
  cancel-in-progress: false

jobs:
  build-source-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run business source collection script
        run: python scripts/fetch_business_sources.py

      - name: Commit and push business source pack
        run: |
          git config user.name "business-briefing-bot"
          git config user.email "business-briefing-bot@users.noreply.github.com"

          git add data/source_packs/

          if git diff --cached --quiet; then
            echo "No source pack changes to commit."
          else
            git commit -m "Add business source pack"
            git push origin HEAD:main
          fi
